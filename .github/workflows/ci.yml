name: CI

on:
  pull_request:
    paths:
      - Dockerfile
      - docker-compose.yml
      - docker-compose.build.yml
      - .dockerignore
      - .github/workflows/**
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - docker-compose.yml
      - docker-compose.build.yml
      - .dockerignore
      - .github/workflows/**
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  classify-changes:
    name: Classify Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      needs_build: ${{ steps.filter.outputs.needs_build }}
      needs_compose_check: ${{ steps.filter.outputs.needs_compose_check }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "needs_compose_check=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="$BASE_SHA"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base="$(git rev-list --max-count=1 HEAD^)"
          fi

          changed_files="$(git diff --name-only "$base" "$HEAD_SHA")"
          printf 'Changed files:\n%s\n' "$changed_files"

          needs_build=false
          needs_compose_check=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              Dockerfile|.dockerignore|docker-compose.build.yml|.github/workflows/*)
                needs_build=true
                needs_compose_check=true
                ;;
              docker-compose.yml)
                needs_compose_check=true
                ;;
            esac
          done <<< "$changed_files"

          echo "needs_build=$needs_build" >> "$GITHUB_OUTPUT"
          echo "needs_compose_check=$needs_compose_check" >> "$GITHUB_OUTPUT"

  compose-config:
    name: Compose Config
    runs-on: ubuntu-latest
    needs: classify-changes
    if: ${{ needs.classify-changes.outputs.needs_compose_check == 'true' }}
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate published-image compose file
        run: docker compose -f docker-compose.yml config -q

      - name: Validate local-build compose files
        run: docker compose -f docker-compose.yml -f docker-compose.build.yml config -q

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: classify-changes
    if: ${{ needs.classify-changes.outputs.needs_build == 'true' }}
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: coding-agent-box:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image exists
        run: docker image inspect coding-agent-box:ci > /dev/null
