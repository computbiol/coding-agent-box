name: CI

on:
  pull_request:
    paths:
      - Dockerfile
      - docker-compose.yml
      - .dockerignore
      - .github/workflows/**
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - docker-compose.yml
      - .dockerignore
      - .github/workflows/**
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: coding-agent-box:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image exists
        run: docker image inspect coding-agent-box:ci > /dev/null
